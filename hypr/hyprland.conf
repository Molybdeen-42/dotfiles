# Variables

## Applications
$terminal = kitty
$fileManager = nautilus
$applauncher = wofi -i --show drun --allow-images -D key_expand=Tab

## Modifiers
$mainMod = SUPER
$swapMod = SUPER_ALT
$screenChangeMod = SUPER_SHIFT
$workspaceMod = SUPER_CTRL


# General

## Resize windows from edges
general {
    resize_on_border = true
    extend_border_grab_area = 15
    hover_icon_on_border = true
}

## Active and Inactive border colors
general {
    border_size = 2 

    col.active_border = rgba(1a0933ff) rgba(3730a3ff) rgba(0e7490ff) rgba(047857ff) rgba(22c55eff) 45deg # Active windows have a diagonal color shift from purple to green
    col.inactive_border = rgba(1c1d1faa) # Inactive windows display a gray border
}

## Border gaps
general {
    gaps_out = 7
    gaps_in = 3
}


# Keybindings

## Volume & Video
bindel = $mainMod, F11, exec, wpctl set-volume -l 1.0 @DEFAULT_AUDIO_SINK@ 5%- # Decreases volume by 5%
bindel = $mainMod, F12, exec, wpctl set-volume -l 1.0 @DEFAULT_AUDIO_SINK@ 5%+ # Increases volume by 5%
bindl = $mainMod, F10, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle # Mutes audio output
bindl = $mainmod ALT, F10, exec, wpctl set-mute, @DEFAULT_AUDIO_SOURCE@ toggle # Mutes audio input

bindl = $mainMod, F7,  exec, playerctl previous # Previous video/song
bindl = $mainMod, F9,  exec, playerctl next # Next video/song
bindl = $mainMod, F8,  exec, playerctl play-pause # Pauses and unpauses video/song

## Screenshots
bind = $mainMod, S, exec, hyprshot -m region # Screenshot select region

## Applications
bind = $mainMod, T, exec, $terminal # Starts the terminal
bind = $mainMod, Q, killactive, # Kills the active window
bind = $mainMod, F, exec, $fileManager # Starts the file manager
bind = $mainMod, M, exec, $applauncher # Starts the app launcher
bind = $mainMod, C, exec, hyprpicker -a # Activates color picker

bind = $mainMod, L, exec, loginctl lock-session # Locks current session

## Window management
bindm = $mainMod, mouse:272, movewindow # Allows dragging around windows

bind = $swapMod, left, swapwindow, l # Swaps with window left to current window
bind = $swapMod, right, swapwindow, r # Swaps with window right to current window
bind = $swapMod, down, swapwindow, d # Swaps with window below current window
bind = $swapMod, up, swapwindow, u # Swaps with window above current window

bind = $mainMod, left, movefocus, l # Shifts focus to window left of current window
bind = $mainMod, right, movefocus, r # Shifts focus to window right of current window
bind = $mainMod, down, movefocus, d # Shifts focus to window below current window
bind = $mainMod, up, movefocus, u # Shifts focus to window above current window

bind = $screenChangeMod, left, movewindow, mon:l # Move window to screen to the left
bind = $screenChangeMod, right, movewindow, mon:r # Moves window to screen to the right

bind = , F11, fullscreen, 0 # Sets active screen to fullscreen

## Workspaces
bind = $mainMod, 1, workspace, 1 # Swaps to workspace 1
bind = $mainMod, 2, workspace, 2 # Swaps to workspace 2
bind = $mainMod, 3, workspace, 3 # Swaps to workspace 3
bind = $mainMod, 4, workspace, 4 # Swaps to workspace 4
bind = $mainMod, 5, workspace, 5 # Swaps to workspace 5
bind = $mainMod, 6, workspace, 6 # Swaps to workspace 6
bind = $mainMod, 7, workspace, 7 # Swaps to workspace 7
bind = $mainMod, 8, workspace, 8 # Swaps to workspace 8
bind = $mainMod, 9, workspace, 9 # Swaps to workspace 9
bind = $mainMod, 0, workspace, 10 # Swaps to workspace 10

bind = $workspaceMod, left, workspace, m-1 # Switches to an earlier workspace on the active screen
bind = $workspaceMod, right, workspace, m+1 # Switchesto a later workspace on the active screen

## Submaps

bind = $mainMod, R, submap, resize # Shifts into the resize submap

### Resize submap
submap = resize

binde = , A, resizeactive, -10 0
binde = , D, resizeactive, 10 0
binde = , S, resizeactive, 0 10
binde = , W, resizeactive, 0 -10

bind = , left, movefocus, l
bind = , right, movefocus, r
bind = , down, movefocus, d
bind = , up, movefocus, u

bind = , R, submap, reset

submap = reset 
###


# Monitors

monitor=DP-9,2560x1440@59.951,-1152x0,1.25,transform,1
monitor=DP-11,2560x1440@59.951,0x0,1.25
monitor=eDP-1,2880x1920@120,2048x0,2.13


# Windows rules

windowrule {
    name = suppress-maximize-events
    match:class = .*

    suppress_event = maximize
}

windowrule {
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}


# Workspaces

## eDP-1
workspace = 1, monitor:eDP-1, default:true, persistent:true
workspace = 2, monitor:eDP-1, persistent:true
workspace = 3, monitor:eDP-1, persistent:true
workspace = 4, monitor:eDP-1, persistent:true

## DP-11
workspace = 5, monitor:DP-11, default:true, persistent:true
workspace = 6, monitor:DP-11, persistent:true
workspace = 7, monitor:DP-11, persistent:true
workspace = 8, monitor:DP-11, persistent:true

## DP-9
workspace = 9, monitor:DP-9, default:true, persistent:true
workspace = 10, monitor:DP-9, persistent:true


# Start on launchDon't copy-paste a rice — make each choice yours.

exec-once = hyprpaper
exec-once = hypridle

exec-once = quickshell
exec-once = dunst
exec-once = systemctl --user start hyprpolkitagent

exec-once = protonvpn-app


# Environment variables

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = WLR_NO_HARDWARE_CURSORS,1


# Input

input {
    touchpad {
        natural_scroll = true # Inverts scrolling on laptop touchpad
    }
}


# Cursor

cursor {
    inactive_timeout = 3
    hide_on_key_press = true
}


# Decoration

decoration {
    rounding = 5
    border_part_of_window = true

    inactive_opacity = 0.9
    active_opacity = 1

    dim_inactive = true
    dim_strength = 0.15
}


# Animations

animation {
    bezier = smooth, 0.52, 0.08, 0.61, 0.88 # Clean transition
    bezier = switch, 1, -0.32, 0.61, 0.88 # Move back slightly before cleanly transitioning

    animation = windowsIn, 1, 5, smooth, popin 10%
    animation = windowsOut, 1, 5, smooth, popin 10%
    animation = workspaces, 1, 5, switch, slide
    animation = windowsMove, 1, 3, smooth, slide
}