# Background

background {
    monitor = eDP-1
    color = rgba(0, 0, 0, 1)
    path = $HOME/wallpapers/images/blindfold-edp1.png
}

background {
    monitor = DP-11
    color = rgba(0, 0, 0, 1)
    path = $HOME/wallpapers/images/blindfold-edp1.png
}

background {
    monitor = DP-9
    color = rgba(0, 0, 0, 1)
}


# Input appearance

## Display eDP-1
input-field {
    monitor = eDP-1
    size = 300, 50
    position = 0, -40

    halign = center
    valign = center

    outline_thickness = 2
    rounding = 6
    placeholder_text = <i>Password...</i>

    inner_color = rgba(0, 0, 0, 0.5)
    outer_color = rgba(1a0933ff) rgba(3730a3ff) rgba(0e7490ff) rgba(047857ff) rgba(22c55eff) 45deg
    font_color = rgb(200, 200, 200)

    fade_on_empty = true

    fail_color = rgb(204, 34, 34)
    fail_text = <i>$ATTEMPTS failed attempts</i>
}

label {
    monitor   = eDP-1
    text      = $TIME
    color     = rgba(200, 200, 200, 1)

    font_size = 72
    font_family = JetBrainsMono Nerd Font

    position  = 0, 150
    halign    = center
    valign    = center
}

label {
    monitor   = eDP-1
    text      = Welcome back $USER
    color     = rgba(200, 200, 200, 1.0)
    font_size = 20

    position  = 0, 80
    halign    = center
    valign    = center
}

