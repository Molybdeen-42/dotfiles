format = """
$username@$hostname\
$directory\
$git_branch\
$character
"""

scan_timeout = 10


[username]
format = "[$user]($style)"
style_user = "bold green"
style_root = "bold red"
show_always = true


[hostname]
format = "[$hostname]($style):"
style = "bold purple"
ssh_only = false


[directory]
format = "[ $path/ ]($style)"
style = "bold cyan"
truncation_length = 3
truncate_to_repo = true


[git_branch]
format = "at [$branch(:$remote_branch) ]($style)"
style = "bold #5a4870"


[character]
success_symbol = "[❯](brblue)"
error_symbol = "[❯](brred)"